<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoECraft Overlay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 8px;
        }
        .missing-label {
            font-size: 14px;
            color: #e94560;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .missing-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .missing-item {
            background: rgba(233, 69, 96, 0.3);
            border: 1px solid #e94560;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 13px;
        }
        .sets-info {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .no-data {
            color: #666;
            font-size: 13px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="missing-label">Missing Items:</div>
    <div class="missing-list" id="missing">
        <span class="no-data">No data yet</span>
    </div>
    <div class="sets-info" id="sets-info"></div>

    <script>
    async function fetchStatus() {
        try {
            const resp = await fetch('/api/status');
            const data = await resp.json();
            const el = document.getElementById('missing');
            const info = document.getElementById('sets-info');

            if (data.missing_classes && data.missing_classes.length > 0) {
                el.innerHTML = data.missing_classes.map(c =>
                    `<span class="missing-item">${c}</span>`
                ).join('');
            } else if (data.completed_sets > 0) {
                el.innerHTML = '<span class="missing-item" style="border-color: #4ade80; color: #4ade80;">All sets complete!</span>';
            } else {
                el.innerHTML = '<span class="no-data">No missing items</span>';
            }

            info.textContent = `Sets: ${data.completed_sets || 0}/${data.total_sets || 0} complete`;
        } catch (e) {
            document.getElementById('missing').innerHTML = '<span class="no-data">Connection lost</span>';
        }
    }

    fetchStatus();
    setInterval(fetchStatus, {{ config.refresh_interval * 1000 if config and config.refresh_interval else 30000 }});
    </script>
</body>
</html>
