<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PoECraft{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { max-width: 960px; margin: 0 auto; padding: 1rem; }
        header {
            background: #16213e;
            padding: 1rem;
            border-bottom: 2px solid #e94560;
            margin-bottom: 1rem;
        }
        header h1 { color: #e94560; font-size: 1.5rem; }
        header .subtitle { color: #888; font-size: 0.85rem; }
        .card {
            background: #16213e;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #0f3460;
        }
        .card h2 { color: #e94560; font-size: 1.1rem; margin-bottom: 0.5rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.4rem 0.6rem; text-align: left; border-bottom: 1px solid #0f3460; }
        th { color: #e94560; font-weight: 600; }
        .status-ok { color: #4ade80; }
        .status-warn { color: #fbbf24; }
        .status-err { color: #ef4444; }
        .btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn:hover { background: #c73652; }
        footer { color: #666; font-size: 0.75rem; text-align: center; padding: 1rem; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <h1>PoECraft</h1>
            <div class="subtitle">Chaos Recipe Filter Tool — Linux Native</div>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer>
        PoECraft v{{ version | default('0.1.0') }} — Not affiliated with Grinding Gear Games
    </footer>
</body>
</html>
